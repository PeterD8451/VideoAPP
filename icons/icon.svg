<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Filmstrip frame -->
  <rect x="96" y="128" width="320" height="256" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-width="6"/>
  <!-- Sprocket holes -->
  <g fill="#38bdf8">
    <rect x="116" y="148" width="24" height="18" rx="4"/>
    <rect x="116" y="186" width="24" height="18" rx="4"/>
    <rect x="116" y="224" width="24" height="18" rx="4"/>
    <rect x="116" y="262" width="24" height="18" rx="4"/>
    <rect x="116" y="300" width="24" height="18" rx="4"/>
    <rect x="116" y="338" width="24" height="18" rx="4"/>
    <rect x="372" y="148" width="24" height="18" rx="4"/>
    <rect x="372" y="186" width="24" height="18" rx="4"/>
    <rect x="372" y="224" width="24" height="18" rx="4"/>
    <rect x="372" y="262" width="24" height="18" rx="4"/>
    <rect x="372" y="300" width="24" height="18" rx="4"/>
    <rect x="372" y="338" width="24" height="18" rx="4"/>
  </g>
  <!-- Play triangle -->
  <polygon points="220,200 320,256 220,312" fill="#38bdf8"/>
  <!-- Time markers -->
  <circle cx="180" cy="420" r="14" fill="#22c55e"/>
  <circle cx="256" cy="420" r="14" fill="#a855f7"/>
  <circle cx="332" cy="420" r="14" fill="#f97316"/>
